
services:
  db:
    container_name: foodgram-db
    image: postgres:13.10-alpine
    env_file:
      - ./.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: foodgram-backend
    image: ${DOCKERHUB_USERNAME}/foodgram_backend:latest
    env_file:
      - ./.env
    volumes:
      - static:/app/static
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    container_name: foodgram-front
    image: ${DOCKERHUB_USERNAME}/foodgram_frontend:latest
    command: cp -r /app/build/. /frontend_build/
    volumes:
      - frontend_build:/frontend_build
    restart: "no"

  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html/
      - static:/static/
      - media:/media/
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    restart: always

volumes:
  pg_data:
  static:
  media:
  frontend_build:
