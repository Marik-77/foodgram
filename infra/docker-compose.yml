volumes:
  pg_data:
  static:
  media:
  frontend_build:

services:
  db:
    container_name: foodgram-db
    image: postgres:13.10-alpine
    env_file:
      - ./.env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: foodgram-backend
    image: ${DOCKERHUB_USERNAME:-local}/foodgram_backend:latest
    build: ../backend
    env_file:
      - ./.env
    volumes:
      - static:/app/static
      - media:/app/media
      - ../data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1',8000)); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s

  frontend:
    container_name: foodgram-front
    image: ${DOCKERHUB_USERNAME:-local}/foodgram_frontend:latest
    build: ../frontend
    command: cp -r /app/build/. /frontend_build/
    volumes:
      - frontend_build:/frontend_build

  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html/
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static:/static/
      - media:/media/
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
