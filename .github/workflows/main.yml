name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      platforms:
        description: "Платформы образов (arm64 на GitHub собирается через QEMU — очень долго)"
        required: false
        default: linux/amd64
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64

env:
  PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platforms || 'linux/amd64' }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(env.PLATFORMS, 'arm64')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(env.PLATFORMS, 'arm64')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create remote infra directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/${{ secrets.SERVER_USER }}/foodgram/infra/ssl
            mkdir -p /home/${{ secrets.SERVER_USER }}/foodgram/infra/certbot/www

      - name: Copy docker-compose and nginx to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infra/docker-compose.production.yml,infra/nginx.conf,infra/nginx.http-only.conf"
          target: "/home/${{ secrets.SERVER_USER }}/foodgram/infra/"
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/foodgram/infra

            if [ ! -f .env ]; then
              echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" > .env
              echo "DEBUG=False" >> .env
              echo "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}" >> .env
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
              echo "DB_ENGINE=django.db.backends.postgresql" >> .env
              echo "DB_HOST=db" >> .env
              echo "DB_PORT=5432" >> .env
              echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
              echo "CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}" >> .env
            fi

            if [ ! -f ssl/fullchain.pem ]; then
              H="${{ secrets.ALLOWED_HOSTS }}"
              H=${H%%,*}
              H=${H// /}
              [ -z "$H" ] && H=localhost
              openssl req -x509 -nodes -days 825 -newkey rsa:2048 \
                -keyout ssl/privkey.pem -out ssl/fullchain.pem \
                -subj "/CN=$H"
            fi

            if docker info >/dev/null 2>&1; then
              SUDO=""
            elif sudo -n docker info >/dev/null 2>&1; then
              SUDO="sudo "
            else
              echo "Нет доступа к Docker. На сервере: sudo usermod -aG docker ${{ secrets.SERVER_USER }}"
              exit 1
            fi

            ${SUDO}docker compose -f docker-compose.production.yml pull
            ${SUDO}docker compose -f docker-compose.production.yml up -d --remove-orphans

            ${SUDO}docker compose -f docker-compose.production.yml ps
            ${SUDO}docker image prune -f
