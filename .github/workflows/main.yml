# Мультиархитектурные образы (linux/amd64 + linux/arm64) → Docker Hub → деплой по SSH.
# Бэкенд в контейнере запускается через Gunicorn (см. backend/entrypoint.sh).

name: Build Multi-arch and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create remote infra directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/${{ secrets.SERVER_USER }}/foodgram/infra

      - name: Copy docker-compose and nginx to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infra/docker-compose.production.yml,infra/nginx.conf"
          target: "/home/${{ secrets.SERVER_USER }}/foodgram/infra/"
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/foodgram/infra

            if [ ! -f .env ]; then
              echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" > .env
              echo "DEBUG=False" >> .env
              echo "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}" >> .env
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
              echo "DB_ENGINE=django.db.backends.postgresql" >> .env
              echo "DB_HOST=db" >> .env
              echo "DB_PORT=5432" >> .env
              echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env
            fi

            # Доступ к Docker: либо пользователь в группе docker, либо passwordless sudo (sudo -n).
            if docker info >/dev/null 2>&1; then
              SUDO=""
            elif sudo -n docker info >/dev/null 2>&1; then
              SUDO="sudo "
            else
              echo "Нет доступа к Docker. На сервере выполните: sudo usermod -aG docker ${{ secrets.SERVER_USER }}"
              echo "Затем переподключитесь по SSH или выполните: newgrp docker"
              exit 1
            fi

            ${SUDO}docker compose -f docker-compose.production.yml pull
            ${SUDO}docker compose -f docker-compose.production.yml up -d --remove-orphans

            ${SUDO}docker compose -f docker-compose.production.yml ps
            ${SUDO}docker image prune -f
